# ============================================================================
# EventHorizon — docker-compose for local development & FVP smoke test
# ============================================================================
# Brings up:
#   * mysql:8.0           — Phase 1 FVP data source with init scripts
#                            (db/mysql/init/01_fvp_schema.sql + 02_users.sh).
#                            MySQL is one of N possible source kinds — not
#                            special to the gateway. Swap or add sources by
#                            editing examples/config/eventhorizon.yaml.
#   * eventhorizon        — the gateway binary built from this repo. The
#                            gateway reads EXACTLY ONE configuration file
#                            (EH_CONFIG); everything connector-specific lives
#                            in that file. The gateway has no MySQL-specific
#                            (or any-other-connector-specific) env vars.
#
# Secrets injected from the operator's shell or local .env (gitignored):
#
#   MYSQL_ROOT_PASSWORD             — operator-owned, for the mysql container's
#                                     entrypoint user creation
#   MYSQL_EH_ADMIN_PASSWORD         — operator-only mysql role
#   MYSQL_EH_SERVICE_PASSWORD       — application's mysql identity, passed
#                                     into the gateway container as
#                                     FVP_MYSQL_SERVICE_PASSWORD and looked
#                                     up by eventhorizon.yaml via ${ENV:...}
#
# See .env.example for the template.
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: eh-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_EH_ADMIN_PASSWORD: ${MYSQL_EH_ADMIN_PASSWORD:?MYSQL_EH_ADMIN_PASSWORD is required}
      MYSQL_EH_SERVICE_PASSWORD: ${MYSQL_EH_SERVICE_PASSWORD:?MYSQL_EH_SERVICE_PASSWORD is required}
    ports:
      - "3306:3306"
    volumes:
      - eh-mysql-data:/var/lib/mysql
      - ./db/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uroot
        - --password=${MYSQL_ROOT_PASSWORD}
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  eventhorizon:
    build:
      context: .
      target: runtime
    image: eventhorizon:dev
    container_name: eh-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Generic gateway-level env vars only. NO connector-specific names.
      RUST_LOG: ${RUST_LOG:-info}
      EH_PORT: "8080"
      EH_CONFIG: /etc/eventhorizon/eventhorizon.yaml

      # Secret env vars referenced BY THE CONFIG FILE via ${ENV:...}.
      # Names match exactly what eventhorizon.yaml expects. Each source in
      # the config picks its own env-var name; the gateway does not care.
      FVP_MYSQL_SERVICE_PASSWORD: ${MYSQL_EH_SERVICE_PASSWORD}
    volumes:
      - ./examples/config/eventhorizon.yaml:/etc/eventhorizon/eventhorizon.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  eh-mysql-data:
