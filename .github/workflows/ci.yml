name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ==========================================================================
  # Mandate-5 gates (per zero-trust §5)
  # ==========================================================================
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy (deny warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
      - run: cargo test --workspace --all-features

  # ==========================================================================
  # Schema-first guardrail (zero-trust §11)
  # ==========================================================================
  schema-sync:
    name: schema sync (SCHEMA.md ↔ migrations ↔ schema.sql)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SCHEMA.md, migrations, and schema.sql must agree
        run: bash scripts/check-schema-sync.sh

  schema-lockdown:
    name: control-plane lockdown verify (apply schema.sql + grant check)
    runs-on: ubuntu-latest
    needs: schema-sync
    steps:
      - uses: actions/checkout@v4
      - name: Apply schema.sql to fresh Postgres, assert eh_service is constrained
        run: bash scripts/verify-control-plane-lockdown.sh

  # ==========================================================================
  # Container build smoke test
  # ==========================================================================
  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: eventhorizon:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
