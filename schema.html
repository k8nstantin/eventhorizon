<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHorizon — Schema Reference</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-light.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <style>
    :root {
      --content-max: 920px;
      --sidebar-width: 280px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f6f8fa;
      color: #1f2328;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
        Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }
    header.top {
      background: #0d1117;
      color: #f0f6fc;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #30363d;
    }
    header.top .brand {
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.5px;
    }
    header.top .brand .sub {
      color: #8b949e;
      font-weight: 400;
      margin-left: 8px;
    }
    header.top a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 13px;
      margin-left: 14px;
    }
    header.top a:hover { text-decoration: underline; }
    .draft-banner {
      background: #fff8c5;
      color: #4d3800;
      padding: 8px 24px;
      font-size: 13px;
      border-bottom: 1px solid #eac54f;
    }
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      gap: 0;
      max-width: 1280px;
      margin: 0 auto;
    }
    aside.toc {
      position: sticky;
      top: 90px;
      align-self: start;
      height: calc(100vh - 90px);
      overflow-y: auto;
      padding: 20px 14px 32px 24px;
      border-right: 1px solid #d1d9e0;
      background: #fafbfc;
      font-size: 13px;
      line-height: 1.6;
    }
    aside.toc h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #59636e;
      margin: 6px 0 10px 0;
    }
    aside.toc ol { list-style: none; padding: 0; margin: 0; }
    aside.toc ol li { margin: 4px 0; }
    aside.toc a {
      color: #1f2328;
      text-decoration: none;
      border-radius: 4px;
      padding: 2px 6px;
      display: block;
    }
    aside.toc a:hover { background: #eaeef2; color: #0969da; }
    main {
      padding: 28px 36px 80px 36px;
      background: #ffffff;
      min-height: calc(100vh - 90px);
    }
    main .markdown-body {
      max-width: var(--content-max);
      margin: 0 auto;
      font-size: 15px;
    }
    main .markdown-body h1:first-child { margin-top: 0; }
    pre { overflow-x: auto; }
    .loading {
      text-align: center;
      padding: 80px 0;
      color: #59636e;
    }
    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      aside.toc { display: none; }
      main { padding: 20px 18px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">EventHorizon · Schema Reference <span class="sub">v0.1 DRAFT</span></div>
    <nav>
      <a href="https://github.com/k8nstantin/eventhorizon">Repo</a>
      <a href="index.html">Architecture</a>
      <a href="https://github.com/k8nstantin/eventhorizon/blob/main/SCHEMA.md">Markdown source</a>
      <a href="https://github.com/k8nstantin/eventhorizon/issues">Issues</a>
    </nav>
  </header>

  <div class="draft-banner">
    <strong>DRAFT.</strong> Every table, column, index, constraint, and seed row defined here is subject to <strong>per-change operator approval</strong> per zero-trust §11 (Schema-First, Code-After).
  </div>

  <div class="layout">
    <aside class="toc">
      <h3>Contents</h3>
      <ol id="toc"><li>Loading…</li></ol>
    </aside>
    <main>
      <article class="markdown-body" id="content">
        <div class="loading">Loading schema document…</div>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
  <script>
    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/[`*_]/g, "")
        .replace(/[^\w\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-");
    }

    function buildToc(markdown) {
      const lines = markdown.split("\n");
      const items = [];
      let inFence = false;
      for (const line of lines) {
        if (line.startsWith("```")) { inFence = !inFence; continue; }
        if (inFence) continue;
        const m = line.match(/^(#{2,3})\s+(.*?)\s*$/);
        if (!m) continue;
        items.push({ level: m[1].length, text: m[2], slug: slugify(m[2]) });
      }
      return items;
    }

    fetch("SCHEMA.md", { cache: "no-cache" })
      .then((r) => {
        if (!r.ok) throw new Error("Failed to load SCHEMA.md (" + r.status + ")");
        return r.text();
      })
      .then((md) => {
        const renderer = new marked.Renderer();
        renderer.heading = (text, level) => {
          const slug = slugify(text);
          return `<h${level} id="${slug}"><a href="#${slug}" style="color:inherit;text-decoration:none">${text}</a></h${level}>`;
        };
        marked.setOptions({
          renderer,
          gfm: true,
          breaks: false,
          highlight: (code, lang) => {
            try {
              return lang && hljs.getLanguage(lang)
                ? hljs.highlight(code, { language: lang }).value
                : hljs.highlightAuto(code).value;
            } catch (e) { return code; }
          },
        });

        document.getElementById("content").innerHTML = marked.parse(md);

        const toc = document.getElementById("toc");
        toc.innerHTML = "";
        const items = buildToc(md);
        for (const it of items) {
          const li = document.createElement("li");
          li.style.marginLeft = (it.level - 2) * 12 + "px";
          const a = document.createElement("a");
          a.href = "#" + it.slug;
          a.textContent = it.text;
          li.appendChild(a);
          toc.appendChild(li);
        }
      })
      .catch((err) => {
        document.getElementById("content").innerHTML =
          '<div class="loading" style="color:#cf222e">' +
          "Failed to render: " + (err.message || err) +
          '<br><br>Fetch the raw markdown at <a href="SCHEMA.md">SCHEMA.md</a>.</div>';
      });
  </script>
</body>
</html>
